aid: national-institute-of-food-and-agriculture
name: National Institute of Food and Agriculture
description: >-
  The National Institute of Food and Agriculture (NIFA) provides leadership
  and funding for programs that advance agriculture-related sciences. NIFA
  invests in and supports initiatives that ensure the long-term viability
  of agriculture, partnering with land-grant universities and the broader
  agricultural research community.
